name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Addon's declared minimum (bl_info "blender": (5, 0, 0)).
          - blender_version: "5.0.1"
            blender_series: "5.0"
          # Latest 5.1 corrective release.
          - blender_version: "5.1.2"
            blender_series: "5.1"
    name: Blender ${{ matrix.blender_version }}
    steps:
      - name: Checkout into a `hardedge_tools` package folder
        uses: actions/checkout@v4
        with:
          # The repo root IS the addon package, so check it out into a folder
          # named `hardedge_tools` so `import hardedge_tools` resolves.
          path: hardedge_tools

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ matrix.blender_version }}-linux-x64

      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/blender
          url="https://download.blender.org/release/Blender${{ matrix.blender_series }}/blender-${{ matrix.blender_version }}-linux-x64.tar.xz"
          echo "Downloading $url"
          curl -fsSL "$url" | tar -xJ -C ~/blender --strip-components=1

      - name: Install pytest into Blender's Python
        run: |
          set -euo pipefail
          ~/blender/blender --background --factory-startup \
            --python-expr "import sys, subprocess; subprocess.check_call([sys.executable, '-m', 'ensurepip', '--upgrade']); subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--upgrade', 'pip', 'pytest'])"

      - name: Run tests
        run: |
          set -euo pipefail
          ~/blender/blender --background --factory-startup \
            --python-expr "import pytest, sys; sys.exit(pytest.main(['-q', 'hardedge_tools/tests']))"
